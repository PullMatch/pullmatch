name: PullMatch
slug: pullmatch
short_description: Deterministic reviewer suggestions for GitHub pull requests.
long_description: |
  PullMatch analyzes pull request file changes and repository commit history to suggest
  the best reviewers for each PR. It ranks candidates using deterministic signals:
  exact-file commits, directory-level familiarity, recency, and code-owner weighting.

  PullMatch comments directly on pull requests so teams can move faster with less
  manual reviewer routing.
categories:
  - Code review
  - Developer tools
