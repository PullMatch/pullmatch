app = 'pullmatch-api-prod'
primary_region = 'iad'

[build]
  dockerfile = 'apps/api/Dockerfile'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'

[checks]
  [checks.health]
    type = 'http'
    port = 3000
    path = '/health'
    interval = '30s'
    timeout = '5s'
